<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - HiddenPath Explorer</title>

  <!-- CSS Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />

  <!-- Icons Library -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet">
</head>

<body class="bg-[#F3F4F1] text-[#2C3E2C] font-sans">
  <!-- Navigation (simplified for register page) -->
  <nav class="bg-[#F3F4F1]/90 backdrop-blur-md sticky top-0 z-50 border-b border-[#4A644A]/20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-gradient-to-br from-[#8DA38D] to-[#4A644A] rounded-lg flex items-center justify-center shadow-lg">
            <i data-lucide="leaf" class="text-[#F3F4F1] w-5 h-5"></i>
          </div>
          <span class="text-xl font-bold text-[#2C3E2C] font-serif tracking-wide">
            HiddenPath
          </span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Register Form -->
  <main class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white border border-[#4A644A]/20 p-8 rounded-2xl shadow-xl">
      <div class="text-center mb-8">
        <div
          class="w-12 h-12 bg-gradient-to-br from-[#8DA38D] to-[#4A644A] rounded-lg flex items-center justify-center mx-auto mb-4 shadow-md">
          <i data-lucide="user-plus" class="text-[#F3F4F1] w-6 h-6"></i>
        </div>
        <h2 class="text-2xl font-bold text-[#2C3E2C] font-serif">Join HiddenPath</h2>
        <p class="text-[#4A644A]/80 text-sm">Create your account to start exploring</p>
      </div>

      <form id="register-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-[#4A644A] uppercase mb-1">Email</label>
          <input type="email" id="email" required
            class="w-full bg-[#F3F4F1] border border-[#8DA38D]/30 rounded-lg py-3 px-4 text-[#2C3E2C] focus:outline-none focus:border-[#4A644A] transition-colors"
            placeholder="explorer@hiddenpath.com" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-[#4A644A] uppercase mb-1">Password</label>
          <input type="password" id="password" required
            class="w-full bg-[#F3F4F1] border border-[#8DA38D]/30 rounded-lg py-3 px-4 text-[#2C3E2C] focus:outline-none focus:border-[#4A644A] transition-colors"
            placeholder="••••••••" />
        </div>
        <button type="submit" id="submit"
          class="w-full py-4 bg-[#4A644A] rounded-xl font-bold text-white hover:bg-[#2C3E2C] transition-colors shadow-lg shadow-[#4A644A]/20">
          Create Account
        </button>
      </form>

      <div class="text-center mt-6">
        <p class="text-[#4A644A]/80 text-sm">
          Already have an account?
          <a href="login.html" class="text-[#4A644A] font-bold hover:underline">Login here</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-900 border-t border-slate-800 py-8 text-center text-slate-500 text-sm">
    <p>© 2025 HiddenPath Explorer. Bringing Northeast India closer to you.</p>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="register.js"></script>
</body>

</html>
